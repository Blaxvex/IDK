name: ShopPlugin
version: '${project.version}'
main: de.shopplugin.ShopPlugin
api-version: '1.21'
description: A feature-rich GUI shop plugin
authors: [ YourName ]

commands:
  shop:
    description: Opens the main shop
    usage: /shop [category]
    aliases: [ s ]
  shopadmin:
    description: Admin commands for the shop
    usage: /shopadmin <reload|set|remove>
    aliases: [ sa ]
    permission: shopplugin.admin

permissions:
  shopplugin.shop:
    description: Allows opening the shop
    default: true
  shopplugin.admin:
    description: Allows using admin commands
    default: op
  shopplugin.sell:
    description: Allows selling items
    default: true
