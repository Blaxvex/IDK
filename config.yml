# ShopPlugin Configuration
# Prices are in "Coins" (tracked internally, no Vault needed)
# buy-price: Price to buy the item | 0 = not buyable
# sell-price: Price to sell the item | 0 = not sellable

settings:
  shop-title: "&6&lServer Shop"
  currency-name: "Coins"
  currency-symbol: "$"
  starting-balance: 500.0
  # Sound when buying/selling
  buy-sound: ENTITY_EXPERIENCE_ORB_PICKUP
  sell-sound: BLOCK_NOTE_BLOCK_PLING
  # Max items per page in a category
  items-per-page: 45

messages:
  prefix: "&8[&6Shop&8] &r"
  bought: "&aDu hast &e{amount}x {item} &afür &e{price} {currency} &agekauft!"
  sold: "&aDu hast &e{amount}x {item} &afür &e{price} {currency} &averkauft!"
  not-enough-money: "&cDu hast nicht genug {currency}! Du brauchst &e{price} {currency}&c."
  not-enough-items: "&cDu hast nicht genug &e{item}&c zum Verkaufen."
  no-permission: "&cDu hast keine Berechtigung dafür!"
  item-not-buyable: "&cDieses Item kann nicht gekauft werden."
  item-not-sellable: "&cDieses Item kann nicht verkauft werden."
  inventory-full: "&cDein Inventar ist voll!"
  balance: "&aDein Kontostand: &e{balance} {currency}"
  reload: "&aPlugin erfolgreich neu geladen!"

